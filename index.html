<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sukaleyan — Art historian, feltmaker, vineyard keeper. A personal space for creation, deep thinking, and wine.">
  <title>Sukaleyan</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Sticky Header -->
  <header class="header">
    <div class="header__left">
      <a href="index.html" class="header__logo">sukaleyan</a>
      <p class="header__tagline">art historian · feltmaker · vinophile</p>
    </div>
  </header>

  <!-- Main Split Layout -->
  <main class="split">

    <!-- Left Side: Photo -->
    <section class="split__left">
      <div class="photo-container">
        <img src="images/me bnw.jpg" alt="" class="photo photo--bnw">
        <img src="images/me colored.jpg" alt="Sukaleyan in the vineyard" class="photo photo--color">
      </div>
    </section>

    <!-- Right Side: Tiles -->
    <section class="split__right">
      <div class="tiles">
        <a href="pages/me.html" class="tile" data-color="sunlight">
          <div class="tile__inner">
            <h2 class="tile__title">me</h2>
            <p class="tile__hint">the person behind all this</p>
          </div>
        </a>

        <a href="pages/works.html" class="tile" data-color="sage">
          <div class="tile__inner">
            <h2 class="tile__title">works</h2>
            <p class="tile__hint">what my hands make</p>
          </div>
        </a>

        <a href="pages/traces.html" class="tile" data-color="forest">
          <div class="tile__inner">
            <h2 class="tile__title">traces</h2>
            <p class="tile__hint">words, research, long journeys</p>
          </div>
        </a>

        <a href="pages/the-vine.html" class="tile" data-color="bordeaux">
          <div class="tile__inner">
            <h2 class="tile__title">the vine</h2>
            <p class="tile__hint">vine, wine, and everything between</p>
          </div>
        </a>
      </div>
    </section>

  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer__inner">
      <p class="footer__text">get in touch</p>
      <div class="footer__links">
        <a href="https://instagram.com/sukaleyan" target="_blank" rel="noopener" class="footer__link">
          <span class="footer__link-label">instagram</span>
        </a>
        <a href="https://linkedin.com/in/sukaleyan" target="_blank" rel="noopener" class="footer__link">
          <span class="footer__link-label">linkedin</span>
        </a>
        <a href="mailto:hello@sukaleyan.com" class="footer__link">
          <span class="footer__link-label">message</span>
        </a>
      </div>
    </div>
    <p class="footer__copy">&copy; 2026 Sukaleyan</p>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
